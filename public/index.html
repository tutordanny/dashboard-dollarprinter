<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dollar Printer Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 1.4rem;
      font-weight: 700;
      color: #22d3ee;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo span { font-size: 1.6rem; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.9rem;
      color: #94a3b8;
    }

    .status-dot {
      width: 8px; height: 8px;
      background: #22c55e;
      border-radius: 50%;
      display: inline-block;
    }

    main { padding: 32px; max-width: 1400px; margin: 0 auto; }

    h2 { font-size: 1.5rem; font-weight: 600; margin-bottom: 24px; color: #f1f5f9; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 36px;
    }

    .stat-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 24px;
      transition: border-color 0.2s;
    }

    .stat-card:hover { border-color: #22d3ee; }

    .stat-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.08em; color: #64748b; margin-bottom: 8px; }
    .stat-value { font-size: 2rem; font-weight: 700; color: #f1f5f9; margin-bottom: 6px; }
    .stat-change { font-size: 0.85rem; }
    .stat-change.positive { color: #22c55e; }
    .stat-change.negative { color: #f43f5e; }

    .dashboard-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 24px;
      margin-bottom: 36px;
    }

    @media (max-width: 900px) { .dashboard-grid { grid-template-columns: 1fr; } }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 24px;
    }

    .card h3 { font-size: 1rem; font-weight: 600; color: #94a3b8; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 0.06em; }

    .chart-container { position: relative; height: 200px; display: flex; align-items: flex-end; gap: 6px; }

    .bar {
      flex: 1;
      background: linear-gradient(to top, #0891b2, #22d3ee);
      border-radius: 4px 4px 0 0;
      position: relative;
      transition: opacity 0.2s;
      cursor: pointer;
      min-width: 0;
    }

    .bar:hover { opacity: 0.8; }

    .bar-label {
      position: absolute;
      bottom: -22px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      color: #64748b;
      white-space: nowrap;
    }

    .bar-tooltip {
      display: none;
      position: absolute;
      top: -36px;
      left: 50%;
      transform: translateX(-50%);
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 0.75rem;
      white-space: nowrap;
      color: #22d3ee;
      z-index: 10;
    }

    .bar:hover .bar-tooltip { display: block; }

    .chart-labels { margin-top: 28px; }

    .pie-chart-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .pie-placeholder {
      width: 140px; height: 140px;
      border-radius: 50%;
      background: conic-gradient(#22d3ee 0% 45%, #818cf8 45% 72%, #f472b6 72% 88%, #fb923c 88% 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .pie-inner {
      width: 80px; height: 80px;
      background: #1e293b;
      border-radius: 50%;
    }

    .pie-legend { width: 100%; }
    .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 0.85rem; color: #94a3b8; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; color: #64748b; padding: 8px 12px; border-bottom: 1px solid #334155; }
    td { padding: 14px 12px; border-bottom: 1px solid #1e293b; font-size: 0.9rem; color: #cbd5e1; }
    tr:hover td { background: #263548; }
    tr:last-child td { border-bottom: none; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-completed { background: #14532d; color: #4ade80; }
    .badge-processing { background: #1e3a5f; color: #60a5fa; }
    .badge-pending { background: #451a03; color: #fb923c; }

    .loading { color: #64748b; text-align: center; padding: 40px; }
    .error { color: #f43f5e; text-align: center; padding: 20px; }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <span>💵</span> Dollar Printer
    </div>
    <div class="header-right">
      <span class="status-dot"></span>
      <span id="api-status">Connecting...</span>
      <span>•</span>
      <span id="current-time"></span>
    </div>
  </header>

  <main>
    <h2>Dashboard Overview</h2>

    <div class="stats-grid" id="stats-grid">
      <div class="loading">Loading stats...</div>
    </div>

    <div class="dashboard-grid">
      <div class="card">
        <h3>Monthly Revenue</h3>
        <div class="chart-container" id="revenue-chart">
          <div class="loading">Loading chart...</div>
        </div>
        <div class="chart-labels"></div>
      </div>

      <div class="card">
        <h3>Revenue Breakdown</h3>
        <div class="pie-chart-wrap">
          <div class="pie-placeholder">
            <div class="pie-inner"></div>
          </div>
          <div class="pie-legend">
            <div class="legend-item"><span class="legend-dot" style="background:#22d3ee"></span> Products (45%)</div>
            <div class="legend-item"><span class="legend-dot" style="background:#818cf8"></span> Services (27%)</div>
            <div class="legend-item"><span class="legend-dot" style="background:#f472b6"></span> Subscriptions (16%)</div>
            <div class="legend-item"><span class="legend-dot" style="background:#fb923c"></span> Other (12%)</div>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <h3>Recent Orders</h3>
      <div id="orders-table"><div class="loading">Loading orders...</div></div>
    </div>
  </main>

  <script>
    function updateTime() {
      document.getElementById('current-time').textContent = new Date().toLocaleTimeString();
    }
    updateTime();
    setInterval(updateTime, 1000);

    async function fetchStats() {
      try {
        const res = await fetch('/api/stats');
        const data = await res.json();
        document.getElementById('api-status').textContent = 'Live';

        const fmt = (n) => n >= 1000 ? '$' + (n / 1000).toFixed(1) + 'k' : '$' + n.toFixed(2);

        document.getElementById('stats-grid').innerHTML = `
          <div class="stat-card">
            <div class="stat-label">Total Revenue</div>
            <div class="stat-value">$${(data.totalRevenue / 1000).toFixed(1)}k</div>
            <div class="stat-change positive">↑ ${data.revenueChange}% this month</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Total Orders</div>
            <div class="stat-value">${data.totalOrders.toLocaleString()}</div>
            <div class="stat-change positive">↑ ${data.ordersChange}% this month</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Active Users</div>
            <div class="stat-value">${data.activeUsers.toLocaleString()}</div>
            <div class="stat-change positive">↑ ${data.usersChange}% this month</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Conversion Rate</div>
            <div class="stat-value">${data.conversionRate}%</div>
            <div class="stat-change negative">↓ ${Math.abs(data.conversionChange)}% this month</div>
          </div>
        `;
      } catch (e) {
        document.getElementById('api-status').textContent = 'Error';
        document.getElementById('stats-grid').innerHTML = '<div class="error">Failed to load stats</div>';
      }
    }

    async function fetchRevenue() {
      try {
        const res = await fetch('/api/revenue');
        const data = await res.json();
        const max = Math.max(...data.map(d => d.revenue));
        const chart = document.getElementById('revenue-chart');
        chart.innerHTML = data.map(d => {
          const pct = (d.revenue / max * 100).toFixed(1);
          return `<div class="bar" style="height:${pct}%">
            <div class="bar-tooltip">$${d.revenue.toLocaleString()}</div>
            <div class="bar-label">${d.month}</div>
          </div>`;
        }).join('');
      } catch (e) {
        document.getElementById('revenue-chart').innerHTML = '<div class="error">Failed to load revenue data</div>';
      }
    }

    async function fetchOrders() {
      try {
        const res = await fetch('/api/orders');
        const orders = await res.json();
        const statusClass = { Completed: 'badge-completed', Processing: 'badge-processing', Pending: 'badge-pending' };
        document.getElementById('orders-table').innerHTML = `
          <table>
            <thead>
              <tr><th>Order ID</th><th>Customer</th><th>Amount</th><th>Status</th><th>Date</th></tr>
            </thead>
            <tbody>
              ${orders.map(o => `
                <tr>
                  <td style="color:#22d3ee;font-weight:600">${o.id}</td>
                  <td>${o.customer}</td>
                  <td style="color:#4ade80;font-weight:600">$${o.amount.toFixed(2)}</td>
                  <td><span class="badge ${statusClass[o.status] || ''}">${o.status}</span></td>
                  <td>${o.date}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      } catch (e) {
        document.getElementById('orders-table').innerHTML = '<div class="error">Failed to load orders</div>';
      }
    }

    fetchStats();
    fetchRevenue();
    fetchOrders();
  </script>
</body>
</html>
